<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manifeste | L'Alliance Global Partners</title>
  <meta name="description" content="Le manifeste de L'Alliance — nos convictions profondes sur le partenariat, la responsabilité et la complexité." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="grain-bg" aria-hidden="true"></div>
  <a class="skip-link" href="#main-content">Aller au contenu principal</a>

  <nav class="navbar scrolled" role="navigation" aria-label="Navigation principale">
    <div class="container">
      <div class="navbar__inner">
        <a href="/" class="navbar__logo" aria-label="Retour à l'accueil L'Alliance">
          <svg class="navbar__logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          <div class="navbar__logo-text">
            <span class="navbar__logo-name">L'Alliance</span>
            <span class="navbar__logo-sub">Global Partners</span>
          </div>
        </a>
        <div style="display:flex; align-items:center; gap: var(--space-6);">
          <a class="navbar__link" href="/">Accueil</a>
        </div>
      </div>
    </div>
  </nav>

  <main id="main-content" style="padding-top: 6rem;">
    <div class="container" style="max-width: 720px; padding-block: var(--section-gap);">
      <div class="reveal">
        <span class="label-overline">Manifeste</span>
        <h1 class="heading-1" style="margin-block: var(--space-6) var(--space-10);">
          Ce en quoi<br/>nous croyons.
        </h1>
      </div>
      <div class="reveal" style="transition-delay: 0.15s; display: flex; flex-direction: column; gap: var(--space-8); font-size: var(--text-lg); font-weight: 300; color: var(--color-text-muted); line-height: 1.8;">
        <p>
          Cette page est réservée au contenu du manifeste de L'Alliance.
          Le texte complet sera intégré ici lors de la prochaine itération.
        </p>
        <p>
          <a href="/" class="btn-ghost" style="display:inline-flex;">
            ← Retour à l'accueil
          </a>
        </p>
      </div>
    </div>
  </main>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
